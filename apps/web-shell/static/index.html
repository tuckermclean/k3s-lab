<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Shell</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0b0e14; color: #ddd; }
    header { padding: 10px 12px; background: #11151c; border-bottom: 1px solid #222; display:flex; gap:8px; align-items:center }
    button { background: #2d6cdf; color: white; border: 0; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    #status { margin-left: auto; font-size: 12px; color: #9aa0a6 }
    #term { height: calc(100vh - 52px); }
  </style>
</head>
<body>
  <header>
    <strong>Web Shell</strong>
    <button id="start">New Shell</button>
    <div id="status">idle</div>
  </header>
  <div id="term"></div>

  <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css" />
  <script>
    const term = new Terminal({ cursorBlink: true, fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace' });
    term.open(document.getElementById('term'));
    let ws, pod;

    function setStatus(s){ document.getElementById('status').textContent = s; }

    async function start() {
      try {
        setStatus('starting...');
        const res = await fetch('/api/start');
        if (!res.ok) throw new Error(await res.text());
        pod = (await res.json()).pod;
        setStatus('connecting...');
        connect();
      } catch (e) {
        console.error(e); setStatus('error: ' + e.message);
      }
    }

    function connect() {
      ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws?pod=' + encodeURIComponent(pod));
      ws.onopen = () => { setStatus('connected'); term.focus(); };
      ws.onclose = () => { setStatus('disconnected'); };
      ws.onerror = (e) => { console.error(e); setStatus('error'); };
      ws.onmessage = (ev) => {
        try{
          const m = JSON.parse(ev.data);
          if (m.type === 'output') term.write(m.data);
        } catch { term.write(ev.data); }
      };
      term.onData(d => ws && ws.readyState === 1 && ws.send(JSON.stringify({type:'input', data:d})));
      const resize = () => {
        const cols = term.cols, rows = term.rows;
        ws && ws.readyState === 1 && ws.send(JSON.stringify({type:'resize', cols, rows}));
      };
      window.addEventListener('resize', () => { term.fit && term.fit(); resize(); });
      setTimeout(resize, 100);
    }

    document.getElementById('start').onclick = start;
  </script>
</body>
</html>
