apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-shell
  namespace: web-shell
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`shell.home.dcxxiv.com`)
      middlewares:
        - name: authentik
      services:
        - name: web-shell
          port: 80
  tls:
    secretName: web-shell-tls
