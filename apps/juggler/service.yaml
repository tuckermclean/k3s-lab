apiVersion: v1
kind: Service
metadata:
  name: juggler
  namespace: juggler
  labels:
    app.kubernetes.io/name: juggler
    app.kubernetes.io/part-of: gitops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: juggler
  ports:
    # Fronts the nginx sidecar (:80), never the juggler container's :3939.
    - name: http
      port: 80
      targetPort: http
