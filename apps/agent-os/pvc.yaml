apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-os-home
  namespace: agent-os
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 20Gi fits Longhorn's per-node schedulable budget (~74GB after the 30%
      # reservation); 50Gi failed replica scheduling on every node.
      storage: 20Gi
  storageClassName: longhorn
