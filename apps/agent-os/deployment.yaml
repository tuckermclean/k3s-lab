apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-os
  namespace: agent-os
  labels:
    app.kubernetes.io/name: agent-os
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-os
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-os
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: agent-os
          # Digest pinned after the first CI build publishes the image.
          image: ghcr.io/tuckermclean/agent-os:0.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3011
          env:
            - name: PORT
              value: "3011"
            - name: HOME
              value: /home/node
            # Nothing sets SHELL in a pod; agent-os falls back to /bin/zsh
            # (server.ts) which this image doesn't ship. Terminal sessions
            # exec this shell.
            - name: SHELL
              value: /bin/bash
            - name: DB_PATH
              value: /home/node/.agent-os/agent-os.db
            # In-pod Claude Code sessions dispatch subagents on Sonnet
            - name: CLAUDE_CODE_SUBAGENT_MODEL
              value: sonnet
          envFrom:
            - secretRef:
                name: agent-os-env
          # Builds inside the workspace peg CPU/memory and slow the HTTP
          # server; probes must tolerate a busy-but-alive dev box or the
          # kubelet kills sessions mid-build (2026-07-06 incident).
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "1"
              # Observed 2.3Gi working set during builds; request must cover
              # it or the scheduler packs the pod onto memory-starved nodes.
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: home
              mountPath: /home/node
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: agent-os-home
