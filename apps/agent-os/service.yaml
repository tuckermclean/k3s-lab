apiVersion: v1
kind: Service
metadata:
  name: agent-os
  namespace: agent-os
  labels:
    app.kubernetes.io/name: agent-os
    app.kubernetes.io/part-of: gitops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-os
  ports:
    - name: http
      port: 3011
      targetPort: 3011
    # Dev-server ports exposed on agent.dcxxiv.com:<port> via dedicated
    # Traefik entrypoints (see infrastructure/traefik/helmrelease.yaml).
    - name: dev-3000
      port: 3000
      targetPort: 3000
    - name: dev-5173
      port: 5173
      targetPort: 5173
    - name: dev-8080
      port: 8080
      targetPort: 8080
