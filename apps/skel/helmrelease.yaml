apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: <app-name>
  namespace: <namespace>
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: <chart-name>          # e.g. ingress-nginx, jellyfin
      sourceRef:
        kind: HelmRepository
        name: <helm-repo-name>
        namespace: flux-system
      version: "<chart-version>"
  values: {}

# Notes:
# - Replace placeholders (<...>) before committing.
# - If this app doesn't use Helm, remove this file and use a plain Deployment manifest.
