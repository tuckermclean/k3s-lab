apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`prowlarr.home.dcxxiv.com`)
      middlewares:
        - name: authentik-servarr
      services:
        - name: prowlarr
          port: 9696

  tls:
    secretName: prowlarr-tls