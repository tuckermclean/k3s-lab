apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: jellyfin
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
      version: "2.x"
  values:
    service:
      type: ClusterIP
    persistence:
      config:
        enabled: true
        existingClaim: config-root-pvc
      media:
        enabled: true
        existingClaim: media-root-pvc
