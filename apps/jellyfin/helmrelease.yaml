apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 10m
  chart:
    spec:
      chart: jellyfin
      version: 16.3.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  values:
    env: { TZ: America/Los_Angeles }
    ingress:
      enabled: true
      className: nginx
      hosts: [ { host: jellyfin.home.dcxxiv.com, paths: [ "/" ] } ]
    persistence:
      config: { enabled: true, size: 10Gi }
      media:
        enabled: true
        existingClaim: nfs-omv    # or keep empty for local-path
