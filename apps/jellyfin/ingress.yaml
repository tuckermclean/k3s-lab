apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`jellyfin.home.dcxxiv.com`)
      middlewares:
        - name: authentik
      services:
        - name: jellyfin
          port: 8096

  tls:
    secretName: jellyfin-tls