apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    # Route 1: redirect requests to "/" to the OIDC-triggering URL
    - kind: Rule
      match: Host(`jellyfin.home.dcxxiv.com`) && Path(`/`)
      middlewares:
        - name: jellyfin-root-redirect
        - name: authentik
      services:
        # Service is never really hit because middleware redirects first,
        # but Traefik requires one.
        - name: jellyfin
          port: 8096

    # Route 2: normal Jellyfin traffic, protected by Authentik proxy middleware
    - kind: Rule
      match: Host(`jellyfin.home.dcxxiv.com`) && PathPrefix(`/`)
      middlewares:
        - name: authentik     # your existing Authentik forwardAuth middleware
      services:
        - name: jellyfin
          port: 8096

  tls:
    secretName: jellyfin-tls