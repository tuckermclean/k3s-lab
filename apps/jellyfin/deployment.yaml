apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      # Affinity to run on node k3s01 (hostname)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k3s01
      # Keep empty unless you’ve tainted k3s01
      tolerations: []
      # Not relying on labels; hostname affinity above is enough
      nodeSelector: {}
      containers:
        - name: jellyfin
          image: ghcr.io/jellyfin/jellyfin:10.10.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8096
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          # Optional probes (uncomment if you want them)
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: http
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: http
          #   initialDelaySeconds: 30
          #   periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: config-root-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-root-pvc
