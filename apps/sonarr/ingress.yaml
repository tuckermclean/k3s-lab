apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`sonarr.home.dcxxiv.com`)
      middlewares:
        - name: authentik
      services:
        - name: sonarr
          port: 8989

  tls:
    secretName: sonarr-tls