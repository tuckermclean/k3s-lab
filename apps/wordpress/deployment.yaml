apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wordpress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wordpress
    spec:
      # Bootstrap WordPress non-interactively before Apache serves any traffic.
      # The Service has no endpoints until this pod is Ready, so the install
      # wizard is never publicly reachable (the prior compromise vector).
      initContainers:
        - name: wp-bootstrap
          image: wordpress:cli
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command: ["sh", "/scripts/bootstrap.sh"]
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_HOST
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_NAME
            - name: WORDPRESS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: WORDPRESS_DB_PASSWORD
            - name: WP_URL
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WP_URL
            - name: WP_TITLE
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WP_TITLE
            - name: WP_ADMIN_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WP_ADMIN_USER
            - name: WP_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WP_ADMIN_EMAIL
            - name: WP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: WP_ADMIN_PASSWORD
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
            - name: scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: wordpress
          image: wordpress:php8.3-apache
          imagePullPolicy: IfNotPresent
          # wp-config.php is created by the initContainer (with the proxy-HTTPS
          # fix + hardening). The DB env below is only a self-heal fallback; when
          # wp-config.php exists the official image ignores it.
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_HOST
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_NAME
            - name: WORDPRESS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: WORDPRESS_DB_PASSWORD
            # Mailgun SMTP — read by the smtp.php mu-plugin to route wp_mail().
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: SMTP_PORT
            - name: SMTP_SECURE
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: SMTP_SECURE
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: SMTP_FROM
            - name: SMTP_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: SMTP_FROM_NAME
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: SMTP_PASSWORD
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
            - name: php-uploads
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
              readOnly: true
            - name: mu-plugins
              mountPath: /var/www/html/wp-content/mu-plugins/smtp.php
              subPath: smtp.php
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
      volumes:
        # Fresh volume — the 2026-06-21-compromised "wordpress-data" PVC is left
        # quarantined (see pvc.yaml) and is never mounted here again.
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-data-v2
        - name: php-uploads
          configMap:
            name: wordpress-config
            items:
              - key: uploads.ini
                path: uploads.ini
        - name: scripts
          configMap:
            name: wordpress-config
            items:
              - key: bootstrap.sh
                path: bootstrap.sh
        - name: mu-plugins
          configMap:
            name: wordpress-config
            items:
              - key: smtp.php
                path: smtp.php
