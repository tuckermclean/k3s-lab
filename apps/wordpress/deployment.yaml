apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wordpress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:php8.3-apache
          imagePullPolicy: IfNotPresent
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_HOST
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_NAME
            - name: WORDPRESS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: WORDPRESS_DB_PASSWORD
            # Trust Traefik's X-Forwarded-Proto so WordPress knows it is on HTTPS
            # (avoids redirect loops / mixed content), and pin the canonical URL.
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') { $_SERVER['HTTPS'] = 'on'; }
                define('WP_HOME', 'https://lol.dcxxiv.com');
                define('WP_SITEURL', 'https://lol.dcxxiv.com');
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
            - name: php-uploads
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-data
        - name: php-uploads
          configMap:
            name: wordpress-config
            items:
              - key: uploads.ini
                path: uploads.ini
