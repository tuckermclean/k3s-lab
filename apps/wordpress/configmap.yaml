apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-config
  namespace: wordpress
data:
  # WordPress -> MySQL connection (password comes from the SOPS secret)
  WORDPRESS_DB_HOST: "db:3306"
  WORDPRESS_DB_NAME: "wordpress"
  WORDPRESS_DB_USER: "wordpress"
  # MySQL server bootstrap (root/app passwords come from the SOPS secret)
  MYSQL_DATABASE: "wordpress"
  MYSQL_USER: "wordpress"
  # Non-interactive install parameters used by the wp-bootstrap initContainer.
  # Edit title/username/email to taste; the admin password is in the SOPS secret.
  WP_URL: "https://lol.dcxxiv.com"
  WP_TITLE: "lol"
  WP_ADMIN_USER: "siteadmin"
  WP_ADMIN_EMAIL: "me@tuckermclean.com"
  # Raise PHP upload limits so large IbisPaint PNG exports upload cleanly.
  # Mounted at /usr/local/etc/php/conf.d/uploads.ini in the WordPress container.
  uploads.ini: |
    upload_max_filesize = 64M
    post_max_size = 64M
    max_execution_time = 300
    memory_limit = 256M
  # Bootstrap script run by the wp-bootstrap initContainer (wordpress:cli) before
  # Apache starts. It downloads core, writes wp-config.php (with the reverse-proxy
  # HTTPS fix + hardening), waits for the DB, and installs WordPress
  # non-interactively. This removes the public install-wizard window that led to
  # the 2026-06-21 compromise. Idempotent: safe to re-run on every pod start.
  bootstrap.sh: |
    #!/bin/sh
    set -eu
    cd /var/www/html

    # 1) WordPress core (only when the volume is fresh/empty).
    if [ ! -f wp-settings.php ]; then
      echo "[bootstrap] downloading WordPress core"
      wp core download --allow-root
    fi

    # 2) wp-config.php — written here so the proxy-HTTPS fix and hardening
    #    constants are always present. (The official image will NOT rewrite an
    #    existing wp-config.php, which is why the migrated config was missing this.)
    if [ ! -f wp-config.php ]; then
      echo "[bootstrap] writing wp-config.php"
      wp config create --allow-root --skip-check \
        --dbhost="$WORDPRESS_DB_HOST" \
        --dbname="$WORDPRESS_DB_NAME" \
        --dbuser="$WORDPRESS_DB_USER" \
        --dbpass="$WORDPRESS_DB_PASSWORD" \
        --extra-php <<'PHP'
    // Behind Traefik (TLS terminates at the proxy): trust X-Forwarded-Proto so
    // is_ssl() returns true. Without this, wp-admin / wp-login.php redirect-loop.
    if ( ! empty( $_SERVER['HTTP_X_FORWARDED_PROTO'] ) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
        $_SERVER['HTTPS'] = 'on';
    }
    // Hardening: disable the in-dashboard theme/plugin code editor (a common
    // webshell vector) and keep core patched automatically.
    define( 'DISALLOW_FILE_EDIT', true );
    define( 'WP_AUTO_UPDATE_CORE', 'minor' );
    PHP
    fi

    # 3) Wait for the database to accept authenticated connections.
    echo "[bootstrap] waiting for database"
    until wp db query 'SELECT 1;' --allow-root >/dev/null 2>&1; do
      sleep 3
    done

    # 4) Install WordPress non-interactively (idempotent via is-installed guard).
    if ! wp core is-installed --allow-root; then
      echo "[bootstrap] installing WordPress"
      wp core install --allow-root \
        --url="$WP_URL" \
        --title="$WP_TITLE" \
        --admin_user="$WP_ADMIN_USER" \
        --admin_password="$WP_ADMIN_PASSWORD" \
        --admin_email="$WP_ADMIN_EMAIL" \
        --skip-email
      wp rewrite structure '/%postname%/' --allow-root
    fi

    # 5) Login brute-force protection (best-effort; never block startup on it).
    if ! wp plugin is-installed limit-login-attempts-reloaded --allow-root >/dev/null 2>&1; then
      wp plugin install limit-login-attempts-reloaded --activate --allow-root \
        || echo "[bootstrap] WARN: limit-login-attempts-reloaded install failed (egress?)"
    fi

    # 6) Hand ownership to the Apache image's www-data (uid 33) so it can serve/write.
    chown -R 33:33 /var/www/html
    echo "[bootstrap] done"
