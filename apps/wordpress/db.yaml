apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wordpress-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wordpress-db
    spec:
      containers:
        - name: db
          image: mysql:8
          imagePullPolicy: IfNotPresent
          # NB: mysql:8 -> 8.4 LTS, where --default-authentication-plugin was
          # removed. caching_sha2_password is already the default; no arg needed.
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 1Gi
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: wordpress
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wordpress-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
