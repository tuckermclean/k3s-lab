apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: jellyseerr-chart
      sourceRef:
        kind: HelmRepository
        name: jellyseerr
        namespace: flux-system
      version: 2.6.1
  values:
    podDnsConfig:
      options:
        - name: ndots
          value: 1
    service:
      type: ClusterIP
    config:
      persistence:
        enabled: true
        existingClaim: jellyseerr-config-root-pvc
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-staging"
      hosts:
        - host: jellyseerr.home.dcxxiv.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - jellyseerr.home.dcxxiv.com
          secretName: jellyseerr-tls
    env:
      - name: NODE_OPTIONS
        value: "--dns-result-order=ipv4first"
