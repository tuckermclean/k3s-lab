apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyseerr-nfs-config-pv
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-provisioner
  mountOptions:
    - vers=3
    - proto=tcp
  nfs:
    server: openmediavault.home.dcxxiv.com
    path: /export/Media/jellyseerr-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyseerr-config-root-pvc
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  volumeName: jellyseerr-nfs-config-pv
  storageClassName: nfs-provisioner
