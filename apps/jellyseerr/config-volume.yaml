apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyseerr-nfs-config-pv
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-provisioner
  mountOptions:
    - vers=3
    - proto=tcp
  nfs:
    server: openmediavault.home.dcxxiv.com
    path: /export/Media/jellyseerr-config
