apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orchestrator
  namespace: orchestrator
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/orchestrator
      sourceRef:
        kind: GitRepository
        name: orchestrator
        namespace: flux-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
  # Sensitive values (GitHub App key, Claude OAuth token, OPERATOR_SECRET_KEY,
  # VAPID private key) live in the out-of-band Secret `orchestrator-secrets`
  # (created with kubectl, NOT committed). The chart references it by name.
  values:
    image:
      repository: ghcr.io/tuckermclean/orchestrator
      # Pinned by digest for supply-chain control (v0.1.1 control-plane image).
      digest: "sha256:5da4fff3fd78d22f709bdede6d9e684730382425e4c8e6e7497f74a5ae9206c5"
      tag: ""
      pullPolicy: IfNotPresent

    # SQLite on a ReadWriteOnce PVC → single writer. HA needs Postgres + persistence.enabled=false.
    replicaCount: 1

    secretName: orchestrator-secrets

    config:
      GITHUB_OWNER: "tuckermclean"
      GITHUB_REPO: "sandbox-derp"
      # Default-deny: empty allowlist admits ONLY the repo owner.
      ALLOWLIST: ""
      RECONCILE_CRON: "*/15 * * * *"
      DEDUP_WINDOW: "1000"
      SWARM_LIMITS_GLOBAL: "10"
      SWARM_LIMITS_PER_REPO: "4"
      SWARM_LIMITS_RECONCILES: "4"
      DB_URL: "sqlite:///data/orchestrator.db"
      RECONCILE_MODE: "internal"
      # Non-sensitive VAPID public key (private half is in orchestrator-secrets).
      PUSH_VAPID_PUBLIC_KEY: "BNNDph85ZypknCltjjrQxV_3H7jU99u2JTWRDBVlVTsCcIp5PAU9scdrNuZF2FQsAzLeNUHY1VaxDtM_leBcYds"
      # Each agent dispatch runs as an isolated K8s Job using the pinned agent-runner image.
      HARNESS_EXECUTION_BACKEND: "k8s"
      HARNESS_K8S_IMAGE: "ghcr.io/tuckermclean/orchestrator-agent-runner@sha256:32065727952aba3b3c87fe31acbf6886a66d89125286dc1b513b4a4719563933"

    # The chart's own Ingress is disabled: routing + TLS + authentik gating are
    # handled by a Traefik IngressRoute (ingressroute.yaml) and a cert-manager
    # Certificate (certificate.yaml), so the webhook path can stay public while
    # the UI/API is gated by the shared authentik forwardAuth middleware.
    ingress:
      enabled: false

    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 5Gi
      accessMode: ReadWriteOnce

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # RBAC: ServiceAccount + Role granting Job create/get/list/delete in this
    # namespace, required for the K8s Job harness backend.
    rbac:
      create: true
    serviceAccount:
      create: true
