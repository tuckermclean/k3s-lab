apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: orchestrator
  namespace: orchestrator
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/orchestrator
      sourceRef:
        kind: GitRepository
        name: orchestrator
        namespace: flux-system
      # The chart's Chart.yaml version is a frozen placeholder (0.0.0-dev) — the
      # real version is the git tag. With the default ChartVersion strategy Flux
      # would not re-pull the chart templates on a tag bump. Revision re-packages
      # + upgrades whenever the GitRepository source revision changes.
      reconcileStrategy: Revision
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      retries: 3
      remediateLastFailure: true
  # Upstream chart bug (v0.1.1): the Deployment's `migrate` init container runs
  # `python -m src.db.migrate`, but that module does not exist in the v0.1.1
  # image (src/db/ has no migrate.py). The schema is instead created at app
  # startup — every store uses `CREATE TABLE IF NOT EXISTS` and the ASGI
  # lifespan calls the init routines before serving traffic. So we drop the
  # broken (and redundant) init container via a post-render patch.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: orchestrator
            patch: |
              - op: remove
                path: /spec/template/spec/initContainers
          # Single replica on a ReadWriteOnce Longhorn volume: the default
          # RollingUpdate surges a second pod that can't mount the still-attached
          # RWO volume, deadlocking upgrades. Recreate terminates the old pod
          # (detaching the volume) before starting the new one.
          - target:
              kind: Deployment
              name: orchestrator
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
  # Sensitive values (GitHub App key, Claude OAuth token, OPERATOR_SECRET_KEY,
  # VAPID private key) live in the out-of-band Secret `orchestrator-secrets`
  # (created with kubectl, NOT committed). The chart references it by name.
  values:
    image:
      repository: ghcr.io/tuckermclean/orchestrator
      # Tag-pinned to ${ORCH_VERSION} (single source of truth in the cluster
      # Kustomization's postBuild.substitute). digest empty → chart uses repo:tag.
      tag: "${ORCH_VERSION}"
      digest: ""
      pullPolicy: IfNotPresent

    # SQLite on a ReadWriteOnce PVC → single writer. HA needs Postgres + persistence.enabled=false.
    replicaCount: 1

    secretName: orchestrator-secrets

    config:
      GITHUB_OWNER: "tuckermclean"
      GITHUB_REPO: "sandbox-derp"
      GITHUB_BOT_LOGIN: "orecchiette1111"
      # Default-deny: empty allowlist admits ONLY the repo owner.
      ALLOWLIST: ""
      RECONCILE_CRON: "*/15 * * * *"
      DEDUP_WINDOW: "1000"
      SWARM_LIMITS_GLOBAL: "10"
      SWARM_LIMITS_PER_REPO: "4"
      SWARM_LIMITS_RECONCILES: "4"
      # 4 slashes = ABSOLUTE path /data/orchestrator.db on the Longhorn PVC.
      # 3 slashes parses to a path relative to the read-only /app workdir, which
      # fails at boot in v0.1.4 (real SQLite-backed audit/counter/operator stores):
      # sqlite3.OperationalError: unable to open database file.
      DB_URL: "sqlite:////data/orchestrator.db"
      RECONCILE_MODE: "internal"
      # Non-sensitive VAPID public key (private half is in orchestrator-secrets).
      PUSH_VAPID_PUBLIC_KEY: "BNNDph85ZypknCltjjrQxV_3H7jU99u2JTWRDBVlVTsCcIp5PAU9scdrNuZF2FQsAzLeNUHY1VaxDtM_leBcYds"
      # Each agent dispatch runs as an isolated K8s Job using the pinned agent-runner image.
      HARNESS_EXECUTION_BACKEND: "k8s"
      HARNESS_K8S_IMAGE: "ghcr.io/tuckermclean/orchestrator-agent-runner:${ORCH_VERSION}"

    # The chart's own Ingress is disabled: routing + TLS + authentik gating are
    # handled by a Traefik IngressRoute (ingressroute.yaml) and a cert-manager
    # Certificate (certificate.yaml), so the webhook path can stay public while
    # the UI/API is gated by the shared authentik forwardAuth middleware.
    ingress:
      enabled: false

    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 5Gi
      accessMode: ReadWriteOnce

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # RBAC: ServiceAccount + Role granting Job create/get/list/delete in this
    # namespace, required for the K8s Job harness backend.
    rbac:
      create: true
    serviceAccount:
      create: true
