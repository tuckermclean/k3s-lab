apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No namespace override: gitrepository.yaml must stay in flux-system; the rest
# carry their own metadata.namespace (orchestrator).
labels:
  - pairs:
      app.kubernetes.io/part-of: gitops
resources:
  - namespace.yaml
  - secret.sops.yaml
  - gitrepository.yaml
  - helmrelease.yaml
  - certificate.yaml
  - ingressroute.yaml
