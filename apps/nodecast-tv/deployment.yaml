apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodecast-tv
  namespace: nodecast-tv
  labels:
    app.kubernetes.io/name: nodecast-tv
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nodecast-tv
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodecast-tv
    spec:
      # Upstream image runs as root (chmod 777 /app/data, /app/transcode-cache at build time)
      containers:
        - name: nodecast-tv
          image: ghcr.io/technomancer702/nodecast-tv:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: nodecast-tv-env
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: transcode-cache
              mountPath: /app/transcode-cache
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nodecast-tv-data
        - name: transcode-cache
          emptyDir:
            sizeLimit: 10Gi
