apiVersion: apps/v1
# Secret contract (media/deluge-vpn-env):
# - VPN_SERVICE_PROVIDER, VPN_TYPE (openvpn|wireguard)
# - OPENVPN_USER, OPENVPN_PASSWORD (or WireGuard keys)
# - TZ

kind: Deployment
metadata:
  name: deluge
  namespace: media
  labels:
    app.kubernetes.io/name: deluge
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deluge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deluge
    spec:
      # Share network namespace across containers (default), Gluetun will manage egress
      # Deluge will expose 8112 and others inside the Pod; Gluetun firewall must allow 8112
      dnsPolicy: None
      dnsConfig:
        nameservers: ["127.0.0.1"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add: ["NET_ADMIN"]
          envFrom:
            - secretRef:
                name: deluge-vpn-env
          env:
            - name: FIREWALL_INPUT_PORTS
              value: "8112,58846,50000"
            - name: HEALTH_TARGET_ADDRESS
              value: "cloudflare.com:443"
            - name: DOT
              value: "on"
            - name: DOT_PROVIDERS
              value: "cloudflare"
            - name: DNS_ADDRESS
              value: "127.0.0.1"
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: config
              mountPath: /gluetun
              subPath: gluetun
          ports:
            - name: control
              containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
        - name: deluge
          image: lscr.io/linuxserver/deluge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: web
              containerPort: 8112
            - name: daemon
              containerPort: 58846
            - name: tcp-in
              containerPort: 50000
              protocol: TCP
            - name: udp-in
              containerPort: 50000
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: deluge-vpn-env
                  key: TZ
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: deluge
            - name: media
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "1024Mi"
      volumes:
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: config
          persistentVolumeClaim:
            claimName: deluge-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-root-pvc
