apiVersion: apps/v1
# Secret contract (media/deluge-vpn-env), AirVPN WireGuard via gluetun:
# - WIREGUARD_PRIVATE_KEY, WIREGUARD_PRESHARED_KEY
# Non-secret VPN settings (provider, type, addresses, server, ports) are inline below.
kind: Deployment
metadata:
  name: deluge
  namespace: media
  labels:
    app.kubernetes.io/name: deluge
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deluge
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deluge
        app.kubernetes.io/part-of: gitops
    spec:
      # gluetun owns egress for the whole Pod; all containers share its network
      # namespace and route DNS through it (127.0.0.1).
      dnsPolicy: None
      dnsConfig:
        nameservers: ["127.0.0.1"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # Seed Deluge core.conf on first boot (only if absent), so the incoming
        # port + download location are set without any web-UI step.
        - name: seed-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - "[ -f /config/core.conf ] || cp /seed/core.conf /config/core.conf"
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: deluge
            - name: config-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: gluetun
          image: qmcgaw/gluetun@sha256:0e999c910d8077458ffbd869acfd9faa2a49decbca02afec6370277854587b3e
          imagePullPolicy: IfNotPresent
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add: ["NET_ADMIN"]
          # All VPN/gluetun settings (provider, keys, addresses, server, firewall
          # ports, DNS, TZ) come from the SOPS-encrypted deluge-vpn-env Secret.
          envFrom:
            - secretRef:
                name: deluge-vpn-env
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: config
              mountPath: /gluetun
              subPath: gluetun
          ports:
            - name: control
              containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
        - name: deluge
          image: lscr.io/linuxserver/deluge:2.2.0-ls380@sha256:112cea440ed50b696dc672846b482438a05bc7b1b7f0bda9d1e8171b466c192c
          imagePullPolicy: IfNotPresent
          # linuxserver/deluge starts as root for its s6 init, then drops to
          # PUID/PGID (1000) — override the Pod-level runAsNonRoot accordingly.
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          ports:
            - name: web
              containerPort: 8112
            - name: daemon
              containerPort: 58846
            - name: tcp-in
              containerPort: 26602
              protocol: TCP
            - name: udp-in
              containerPort: 26602
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: deluge-vpn-env
                  key: TZ
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: deluge
            - name: media
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "1024Mi"
      volumes:
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: config
          persistentVolumeClaim:
            claimName: deluge-config
        - name: config-seed
          configMap:
            name: deluge-config-seed
        - name: media
          persistentVolumeClaim:
            claimName: juicefs-media-bucket
