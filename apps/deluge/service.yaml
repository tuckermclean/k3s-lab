apiVersion: v1
kind: Service
metadata:
  name: deluge
  namespace: media
  labels:
    app.kubernetes.io/name: deluge
    app.kubernetes.io/part-of: gitops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: deluge
  ports:
    - name: web
      port: 8112
      targetPort: 8112
    - name: daemon
      port: 58846
      targetPort: 58846
    - name: tcp-in
      port: 50000
      targetPort: 50000
      protocol: TCP
    - name: udp-in
      port: 50000
      targetPort: 50000
      protocol: UDP
