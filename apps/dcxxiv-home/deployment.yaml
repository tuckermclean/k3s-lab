apiVersion: apps/v1
kind: Deployment
metadata:
  name: dcxxiv-home
  namespace: dcxxiv-home
  labels:
    app.kubernetes.io/name: dcxxiv-home
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dcxxiv-home
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcxxiv-home
    spec:
      containers:
        - name: nginx
          image: nginx:1.31-alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: dcxxiv-home-html
