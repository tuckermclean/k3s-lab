apiVersion: v1
kind: ConfigMap
metadata:
  name: dcxxiv-home-html
  namespace: dcxxiv-home
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>DCXXIV</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --ink: #0a0a0a;
          --gold: #c9a96e;
          --mist: #4a4a4a;
          --paper: #f0ece4;
        }

        html, body {
          height: 100%;
          background: var(--ink);
          color: var(--paper);
          font-family: 'Cormorant Garamond', Georgia, serif;
          overflow: hidden;
        }

        body {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
        }

        /* Subtle vignette */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
          pointer-events: none;
          z-index: 0;
        }

        /* Grain texture overlay */
        body::after {
          content: '';
          position: fixed;
          inset: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
          pointer-events: none;
          z-index: 0;
          opacity: 0.4;
        }

        .stage {
          position: relative;
          z-index: 1;
          text-align: center;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 2rem;
        }

        .rule {
          width: 1px;
          height: 80px;
          background: linear-gradient(to bottom, transparent, var(--gold), transparent);
          animation: grow 1.8s ease forwards;
          transform-origin: top;
        }

        @keyframes grow {
          from { transform: scaleY(0); opacity: 0; }
          to   { transform: scaleY(1); opacity: 1; }
        }

        .numeral {
          font-size: clamp(5rem, 18vw, 13rem);
          font-weight: 300;
          letter-spacing: 0.15em;
          line-height: 1;
          color: var(--paper);
          animation: appear 1.2s ease 0.3s both;
          position: relative;
        }

        /* Subtle gold shimmer on the numeral */
        .numeral::after {
          content: attr(data-text);
          position: absolute;
          inset: 0;
          background: linear-gradient(110deg, transparent 35%, rgba(201,169,110,0.18) 50%, transparent 65%);
          background-size: 200% 100%;
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          animation: shimmer 6s ease-in-out 2s infinite;
        }

        @keyframes shimmer {
          0%, 100% { background-position: 200% 0; }
          50%       { background-position: -200% 0; }
        }

        @keyframes appear {
          from { opacity: 0; transform: translateY(12px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .tagline {
          font-size: clamp(0.75rem, 2vw, 1rem);
          font-weight: 300;
          letter-spacing: 0.45em;
          text-transform: uppercase;
          color: var(--mist);
          animation: appear 1.2s ease 0.8s both;
        }

        .rule.bottom {
          animation-delay: 0.2s;
        }

        @media (prefers-reduced-motion: reduce) {
          *, *::after { animation: none !important; }
        }
      </style>
    </head>
    <body>
      <div class="stage">
        <div class="rule"></div>
        <h1 class="numeral" data-text="DCXXIV">DCXXIV</h1>
        <p class="tagline">six hundred &amp; twenty-four</p>
        <div class="rule bottom"></div>
      </div>
    </body>
    </html>
