apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
      version: "2025.6.3"
  values:
    authentik:
      postgresql:
        host: authentik-postgresql
        port: 5432
        user: postgres
        name: authentik
    postgresql:
      enabled: false
    redis:
      enabled: false
    externalRedis:
      host: authentik-redis-master
      port: 6379
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - id.home.dcxxiv.com
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
        tls:
          - hosts:
              - id.home.dcxxiv.com
            secretName: id-tls
      env:
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-postgresql-secret
            key: password
        - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: secretKey

    worker:
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoExecute"
      resources:
        requests:
          ephemeral-storage: "50Mi"
