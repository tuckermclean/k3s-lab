apiVersion: v1
kind: ConfigMap
metadata:
  name: personliness-config
  namespace: personliness
data:
  DEBUG: "False"
  POSTGRES_DB: personliness
  POSTGRES_USER: personliness
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  LLM_ACTIVE_CONFIG: "anthropic"
  LLM_ENABLE_REFINEMENT: "False"
  CREATE_SUPERUSER: "true"
  DJANGO_SUPERUSER_USERNAME: "admin"
  DJANGO_SUPERUSER_EMAIL: "me@tuckermclean.com"
  DJANGO_ALLOWED_HOSTS: "personliness.dcxxiv.com,personliness.home.dcxxiv.com"
  CORS_ALLOWED_ORIGINS: "https://personliness.dcxxiv.com,https://personliness.home.dcxxiv.com"
  nginx.conf: |
    upstream django {
        server localhost:8000;
    }

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
