apiVersion: apps/v1
kind: Deployment
metadata:
  name: personliness
  namespace: personliness
  labels:
    app.kubernetes.io/name: personliness
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: personliness
  template:
    metadata:
      labels:
        app.kubernetes.io/name: personliness
    spec:
      containers:
        - name: web
          image: ghcr.io/tuckermclean/personliness/web@sha256:28761270e96d9c74d083208dbf8c8c0c1a857362e93ff93928b46218faf326bc
          imagePullPolicy: Always
          command: ["/entrypoint.sh"]
          envFrom:
            - configMapRef:
                name: personliness-config
            - secretRef:
                name: personliness-secret
          volumeMounts:
            - name: media-files
              mountPath: /app/media
            - name: static-files
              mountPath: /app/staticfiles

        - name: worker
          image: ghcr.io/tuckermclean/personliness/web@sha256:28761270e96d9c74d083208dbf8c8c0c1a857362e93ff93928b46218faf326bc
          imagePullPolicy: Always
          command: ["celery", "-A", "personliness", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: personliness-config
            - secretRef:
                name: personliness-secret
          volumeMounts:
            - name: media-files
              mountPath: /app/media

        - name: frontend
          image: ghcr.io/tuckermclean/personliness/frontend@sha256:a6309fb531dd357168f1a5c5690a1c0cf765b8ec4fe877227be7858bf1208fb5
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: media-files
              mountPath: /app/media
              readOnly: true
            - name: static-files
              mountPath: /app/staticfiles
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf

      volumes:
        - name: media-files
          persistentVolumeClaim:
            claimName: media-files
        - name: static-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: personliness-config
---
apiVersion: v1
kind: Service
metadata:
  name: personliness
  namespace: personliness
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: personliness
  ports:
    - name: http
      port: 80
      targetPort: 80
