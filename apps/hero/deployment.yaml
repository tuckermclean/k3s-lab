apiVersion: apps/v1
kind: Deployment
metadata:
  name: hero
  namespace: hero
  labels:
    app.kubernetes.io/name: hero
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hero
    spec:
      # Shallow-clone the site repo at startup into a shared volume nginx serves.
      # Assumes the site is served from the repo root of the default branch.
      # Restart the pod to refresh content: kubectl -n hero rollout restart deploy/hero
      initContainers:
        - name: clone
          image: alpine/git:v2.54.0@sha256:8d6ede0b29c666ac111c732468c4d758c1c08f054f211dd98f15d421a6ffab40
          command:
            - sh
            - -c
            - |
              git clone --depth 1 https://github.com/tuckermclean/some-hero.git /tmp/repo
              cp -a /tmp/repo/. /web/
              rm -rf /web/.git
          volumeMounts:
            - name: web
              mountPath: /web
      containers:
        - name: nginx
          image: nginx:1.31-alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: web
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: web
          emptyDir: {}
