apiVersion: apps/v1
kind: Deployment
metadata:
  name: hero
  namespace: hero
  labels:
    app.kubernetes.io/name: hero
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hero
    spec:
      # Shallow-clone the site repo at startup into a shared volume nginx serves.
      # Assumes the site is served from the repo root of the default branch.
      # Restart the pod to refresh content: kubectl -n hero rollout restart deploy/hero
      initContainers:
        - name: clone
          image: alpine/git:v2.54.0@sha256:77418e6e7c7f434c4a98eaff04ef16840cf03649c881c03948e3e213923e3136
          command:
            - sh
            - -c
            - |
              git clone --depth 1 https://github.com/tuckermclean/some-hero.git /tmp/repo
              cp -a /tmp/repo/. /web/
              rm -rf /web/.git
          volumeMounts:
            - name: web
              mountPath: /web
      containers:
        - name: nginx
          image: nginx:1.31-alpine@sha256:4a73073bd557c65b759505da037898b61f1be6cbcc3c2c3aeac22d2a470c1752
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: web
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: web
          emptyDir: {}
