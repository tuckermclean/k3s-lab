apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-bedrock
  namespace: minecraft
spec:
  interval: 5m
  chart:
    spec:
      chart: minecraft-bedrock
      sourceRef:
        kind: HelmRepository
        name: itzg
        namespace: flux-system
      # version: ">=2.0.0"   # optional pin; see repo/releases
  values:
    image:
      repository: itzg/minecraft-bedrock-server
      pullPolicy: IfNotPresent

    minecraftServer:
      # you can set these here OR via existingSecret below
      existingSecret: "bedrock-env"
      eula: true      # Helm value also respected by chart README
      serverPort: 19132
      serviceType: ClusterIP
    resources:
      requests:
        cpu: "200m"
        memory: "1.5Gi"
      limits:
        memory: "2Gi"

    # Persistent world data on your NFS dynamic class (RWX)
    persistence:
      storageClassName: "nfs-provisioner"
      dataDir:
        enabled: true
        Size: 20Gi              # NOTE the capital S
        accessModes: ["ReadWriteMany"]
