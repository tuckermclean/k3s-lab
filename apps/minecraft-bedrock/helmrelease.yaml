apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-bedrock
  namespace: minecraft
spec:
  interval: 5m
  chart:
    spec:
      chart: minecraft-bedrock
      sourceRef:
        kind: HelmRepository
        name: itzg
        namespace: flux-system
      # version: ">=2.0.0"   # optional pin; see repo/releases
  values:
    image:
      repository: itzg/minecraft-bedrock-server
      pullPolicy: IfNotPresent

    minecraftServer:
      # you can set these here OR via existingSecret below
      existingSecret: "bedrock-env"
      eula: true      # Helm value also respected by chart README
      serverPort: 19132
      serviceType: ClusterIP
    resources:
      requests:
        cpu: "200m"
        memory: "2Gi"
      limits:
        memory: "4Gi"

    # Give the container time to finish first-boot init
    startupProbe:
      exec:
        command: ["mc-monitor", "status-bedrock", "--host", "127.0.0.1", "--port", "19132"]
      # 10 min max: 10s * 60 failures
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 3

    # Liveness/readiness can be stricter; they won’t run until startupProbe succeeds
    livenessProbe:
      exec:
        command: ["mc-monitor", "status-bedrock", "--host", "127.0.0.1", "--port", "19132"]
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      initialDelaySeconds: 0  # ignored while startupProbe active

    readinessProbe:
      exec:
        command: ["mc-monitor", "status-bedrock", "--host", "127.0.0.1", "--port", "19132"]
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
      initialDelaySeconds: 0  # ignored while startupProbe active


    # Bedrock sometimes needs writable paths outside /data during init.
    # If you left the chart defaults at readOnlyRootFilesystem: true, flip it:
    securityContext:
      readOnlyRootFilesystem: false

    # Persistent world data on your NFS dynamic class (RWX)
    persistence:
      dataDir:
        enabled: true
        Size: 20Gi              # NOTE the capital S
        accessModes: ["ReadWriteMany"]
