apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lidarr-ingress
  namespace: media
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "local-selfsigned"
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  tls:
    - hosts:
        - lidarr.home.dcxxiv.com
      secretName: lidarr-tls
  rules:
    - host: lidarr.home.dcxxiv.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lidarr
                port:
                  number: 7878
