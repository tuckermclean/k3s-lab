apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lidarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`lidarr.home.dcxxiv.com`)
      middlewares:
        - name: authentik-servarr
      services:
        - name: lidarr
          port: 8686

  tls:
    secretName: lidarr-tls