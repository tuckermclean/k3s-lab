apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: openhands
  labels:
    app.kubernetes.io/name: openhands
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openhands
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openhands
    spec:
      terminationGracePeriodSeconds: 30
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "host.docker.internal"
      containers:
        - name: dind
          image: docker:25-dind
          securityContext:
            privileged: true
          args:
            - --host=unix:///var/run/docker.sock
          volumeMounts:
            - { name: docker-run, mountPath: /var/run }
            - { name: docker-lib, mountPath: /var/lib/docker }
        - name: openhands
          image: docker.all-hands.dev/all-hands-ai/openhands:0.59
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: SANDBOX_RUNTIME_CONTAINER_IMAGE
              value: docker.all-hands.dev/all-hands-ai/runtime:0.59-nikolaik
            - name: LOG_ALL_EVENTS
              value: "true"
            - name: DOCKER_HOST_ADDR
              value: "127.0.0.1"
            - name: LLM_DROP_PARAMS
              value: "true"
            - name: LLM_MODEL
              value: "openai/codex-mini-latest"
            - name: OPENHANDS_ENABLE_PIPELINE_CONDENSER
              value: "false"
            - name: ENABLE_PIPELINE_CONDENSER
              value: "false"
          envFrom:
            - secretRef:
                name: openhands-env
          volumeMounts:
            - name: state
              mountPath: /.openhands
            - name: docker-run
              mountPath: /var/run
      volumes:
        - name: docker-run
          emptyDir: {}
        - name: docker-lib
          emptyDir: {}
        - name: state
          persistentVolumeClaim:
            claimName: openhands-pvc
