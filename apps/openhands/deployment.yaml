apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: openhands
  labels:
    app.kubernetes.io/name: openhands
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openhands
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openhands
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: dind
          image: docker:25-dind
          securityContext:
            privileged: true
          args: ["--host=unix:///var/run/docker.sock","--iptables=false"]
          volumeMounts:
            - { name: docker-run, mountPath: /var/run }
            - { name: docker-lib, mountPath: /var/lib/docker }
          readinessProbe:
            exec:
              command: ["/bin/sh","-lc","wget -qO- --header='Host:' --unix-socket /var/run/docker.sock http://localhost/_ping | grep -q OK"]
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 60
        - name: openhands
          image: docker.all-hands.dev/all-hands-ai/openhands:0.59
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: SANDBOX_RUNTIME_CONTAINER_IMAGE
              value: docker.all-hands.dev/all-hands-ai/runtime:0.59-nikolaik
            - name: LOG_ALL_EVENTS
              value: "true"
          envFrom:
            - secretRef:
                name: openhands-env
          volumeMounts:
            - name: state
              mountPath: /.openhands
            - name: docker-run
              mountPath: /var/run
          startupProbe:
            exec:
              command: ["/bin/sh","-lc","for i in $(seq 1 120); do wget -qO- --header='Host:' --unix-socket /var/run/docker.sock http://localhost/_ping 2>/dev/null | grep -q OK && exit 0; sleep 1; done; exit 1"]
            periodSeconds: 1
            failureThreshold: 120
      volumes:
        - name: docker-run
          emptyDir: {}
        - name: docker-lib
          emptyDir: {}
        - name: state
          persistentVolumeClaim:
            claimName: openhands-pvc
