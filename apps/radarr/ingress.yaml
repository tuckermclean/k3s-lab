apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: gitops
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`radarr.home.dcxxiv.com`)
      middlewares:
        - name: authentik
      services:
        - name: radarr
          port: 7878

  tls:
    secretName: radarr-tls