# One-shot Job that seeds the curriculum baked into the backend image
# (content/generated/course.json + content/audio-out/manifest.json, copied in
# by the repo's backend/Dockerfile) into Postgres. Idempotent — every row is
# upserted by id (seedCourse() in backend/scripts/seed-course.ts).
#
# Jobs are immutable: a content refresh (new image tag) that changes this spec
# requires deleting the completed Job first so Flux can recreate it:
#   kubectl delete job -n bosnia backend-seed
# Re-running after new content ships is safe (upsert).
#
# CONTENT_DIR defaults to /app/content (baked into the image ENV), so the seed
# script finds the course + audio manifest with no override here.
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-seed
  namespace: bosnia
  labels:
    app.kubernetes.io/name: backend-seed
    app.kubernetes.io/part-of: gitops
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-seed
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: ghcr.io/tuckermclean/ljiljan-backend:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["node", "backend/dist/scripts/seed-course.js"]
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
