# Static file server for the Expo web build + reference audio. Single replica
# on a ReadWriteOnce Longhorn volume, so Recreate (not RollingUpdate) — a
# surged second pod could not mount the still-attached RWO volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bosnia-static
  namespace: bosnia
  labels:
    app.kubernetes.io/name: bosnia-static
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bosnia-static
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bosnia-static
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: bosnia-static
        - name: nginx-config
          configMap:
            name: bosnia-static-nginx
