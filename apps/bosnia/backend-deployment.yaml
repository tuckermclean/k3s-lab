# Ljiljan API — Fastify + Drizzle, image published by the bosnia repo's
# .github/workflows/release.yml to ghcr.io/tuckermclean/ljiljan-backend.
# Owns GET /health and everything under /api/* (client API_PREFIX=/api).
# Boots on DATABASE_URL + the two JWT secrets alone; Groq/LiveKit/Azure keys
# are per-feature and may be filled in later (see secret.sops.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bosnia
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/tuckermclean/ljiljan-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          # DATABASE_URL, JWT_*, GROQ_API_KEY, LIVEKIT_*, AZURE_* all come from
          # the SOPS-encrypted Secret.
          envFrom:
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
