# The real-time voice-tutor worker (Python + LiveKit Agents), image published
# to ghcr.io/tuckermclean/ljiljan-voice-agent. It is a worker, not a server:
# it registers with the LiveKit project over an outbound connection and
# receives job dispatches, so there is no containerPort/Service/probe.
#
# It reads the SAME backend-secrets Secret for its LiveKit/Groq/Azure creds.
#
# SHIPPED AT replicas: 0 ON PURPOSE. Those creds are REPLACE_ME placeholders
# in the committed Secret; a running voice-agent would crash-loop without real
# LiveKit credentials, and with `wait: true` on the Flux Kustomization that
# would keep the whole bosnia Kustomization from ever reporting Ready. A
# replicas-0 Deployment is trivially healthy. Once the LiveKit + Azure keys are
# filled (make edit-secret FILE=apps/bosnia/secret.sops.yaml), scale it up:
#   kubectl scale -n bosnia deployment/voice-agent --replicas=1
# (or bump this field and let Flux reconcile).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-agent
  namespace: bosnia
  labels:
    app.kubernetes.io/name: voice-agent
    app.kubernetes.io/part-of: gitops
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-agent
    spec:
      containers:
        - name: voice-agent
          image: ghcr.io/tuckermclean/ljiljan-voice-agent:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
