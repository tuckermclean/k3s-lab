apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      version: "2025.8.4"
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secretKey
      targetPath: authentik.secret_key
  values:
    global:
      host: auth.home.dcxxiv.com
    authentik:
      errorReporting:
        enabled: false
      outposts:
        enabled: true
        types:
          - forward_auth
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: auth.home.dcxxiv.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: authentik-tls
            hosts:
              - auth.home.dcxxiv.com
    postgresql:
      enabled: true
    redis:
      enabled: true
