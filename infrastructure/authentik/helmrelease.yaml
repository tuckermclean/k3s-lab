apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 5m
  timeout: 60m
  install:
    remediation:
      remediateLastFailure: true
    createNamespace: true
  upgrade:
    remediation:
      remediateLastFailure: true
    cleanupOnFail: true
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      version: "2026.5.5"
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secretKey
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-db-secret
      valuesKey: postgres-password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-redis-secret
      valuesKey: redis-password
      targetPath: authentik.redis.password
  values:
    global:
      host: https://auth.dcxxiv.com
      envFrom:
        - secretRef:
            name: authentik-secret
    authentik:
      errorReporting:
        enabled: false
      outposts:
        enabled: true
        types:
          - forward_auth
      postgresql:
        host: pg-rw.postgres.svc.cluster.local
        user: authentik
        name: authentik
      redis:
        host: redis-ha-haproxy.redis.svc.cluster.local
        port: 6379
        db: 1
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - auth.dcxxiv.com
        tls:
          - secretName: authentik-tls
            hosts:
              - auth.dcxxiv.com
          - secretName: authentik-outpost-tls
            hosts:
              - auth.dcxxiv.com
    # Postgres externalized onto the shared CNPG `pg` cluster (database authentik,
    # PG16 — bundled was PG17; pg_dump's transaction_timeout GUC stripped on import).
    # Bundled bitnami postgresql disabled; postgresql-config-pvc orphaned (prune later).
    postgresql:
      enabled: false
    # Redis externalized onto the shared redis-ha cluster (DB 1) via the
    # HAProxy master endpoint — see authentik.redis above. The bundled bitnami
    # redis subchart is disabled (kills a bitnami-image-prune risk + offloads
    # the node). redis-config-pvc is now orphaned; prune separately.
    redis:
      enabled: false
