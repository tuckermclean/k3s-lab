apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 5m
  timeout: 60m
  install:
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
    cleanupOnFail: true
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      version: "2025.8.4"
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: secretKey
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-db-secret
      valuesKey: postgres-password
      targetPath: postgresql.auth.password
    - kind: Secret
      name: authentik-db-secret
      valuesKey: postgres-password
      targetPath: authentik.postgresql.password
  values:
    global:
      host: auth.home.dcxxiv.com
    authentik:
      errorReporting:
        enabled: false
      outposts:
        enabled: true
        types:
          - forward_auth
      postgresql:
        host: authentik-postgresql
        user: authentik
        name: authentik
    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - auth.home.dcxxiv.com
        tls:
          - secretName: authentik-tls
            hosts:
              - auth.home.dcxxiv.com
    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
      primary:
        persistence:
          storageClass: local-path    # or nfs-provisioner
          size: 8Gi
    redis:
      enabled: true
      master:
        persistence:
          storageClass: local-path    # or nfs-provisioner
          size: 8Gi
