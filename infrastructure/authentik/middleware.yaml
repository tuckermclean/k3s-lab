apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: authentik
    namespace: authentik
spec:
    forwardAuth:
        # Authentik 2025.x: embedded outpost runs inside authentik-server on port 9000.
        # The authentik-server Service maps :80 → :9000, so no separate outpost service is needed.
        address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
            - X-authentik-username
            - X-authentik-groups
            - X-authentik-entitlements
            - X-authentik-email
            - X-authentik-name
            - X-authentik-uid
            - X-authentik-jwt
            - X-authentik-meta-jwks
            - X-authentik-meta-outpost
            - X-authentik-meta-provider
            - X-authentik-meta-app
            - X-authentik-meta-version
