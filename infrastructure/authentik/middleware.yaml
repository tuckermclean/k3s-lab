apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ak-forward-auth
  namespace: authentik
spec:
  forwardAuth:
    # Use Authentik Core's embedded outpost endpoint:
    address: https://auth.home.dcxxiv.com/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
