apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-vultr
  namespace: cert-manager
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: ./deploy/cert-manager-webhook-vultr
      sourceRef:
        kind: GitRepository
        name: cert-manager-webhook-vultr
        namespace: flux-system
  values:
    groupName: acme.vultr.com
