apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-vultr
  namespace: cert-manager
spec:
  interval: 5m
  chart:
    spec:
      chart: cert-manager-webhook-vultr
      sourceRef:
        kind: HelmRepository
        name: vultr
        namespace: flux-system
      version: ">=1.0.0"
  values:
    groupName: acme.vultr.com
