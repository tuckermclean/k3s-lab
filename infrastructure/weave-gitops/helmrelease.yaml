apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: weave-gitops
spec:
  interval: 5m
  chart:
    spec:
      chart: weave-gitops
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
        namespace: flux-system
      version: "4.x"
  values:
    adminUser:
      create: false
      existingSecret: weave-gitops-admin
    additionalArgs:
      - --auth-methods=oidc
      - --oidc-secret-name=weave-gitops-oidc
    oidcSecret:
      name: weave-gitops-oidc
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: local-selfsigned
      hosts:
        - host: flux.home.dcxxiv.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: weave-gitops-tls
          hosts:
            - flux.home.dcxxiv.com
