apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: weave-gitops
spec:
  interval: 5m
  chart:
    spec:
      chart: weave-gitops
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
        namespace: flux-system
      version: "4.x"
  values:
    adminUser:
      create: true
      username: admin
      # passwordHash set via out-of-band Secret — see SECURITY.md
      # kubectl create secret generic weave-gitops-admin -n weave-gitops \
      #   --from-literal=password="$(openssl rand -base64 24)"
      existingSecret: weave-gitops-admin
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: local-selfsigned
        traefik.ingress.kubernetes.io/router.middlewares: media-authentik-servarr@kubernetescrd
      hosts:
        - host: flux.home.dcxxiv.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: weave-gitops-tls
          hosts:
            - flux.home.dcxxiv.com
