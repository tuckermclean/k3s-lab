apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: kube-system
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-kube-system
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30687
    - name: https
      port: 443
      targetPort: 8443
      nodePort: 31315
    - name: dashboard
      port: 9000
      targetPort: 8080
      nodePort: 30950
