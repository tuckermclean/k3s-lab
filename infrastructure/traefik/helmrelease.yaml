apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: "19.2.4"        # pin to the version you like
  values:
    rbac:
      enabled: true
    ingressClass:
      enabled: true
      isDefaultClass: true
    service:
      type: LoadBalancer
    ports:
      # expose the “traefik” (dashboard) port in the Service
      traefik:
        expose: true
        port: 9000
        targetPort: 9000
    api:
      # turn on the dashboard and allow insecure (HTTP) access
      dashboard: true
      insecure: true
