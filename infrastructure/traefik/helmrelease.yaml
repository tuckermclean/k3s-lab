apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "41.x"
  values:
    deployment:
      kind: DaemonSet

    service:
      enabled: true
      type: LoadBalancer
      spec:
        externalTrafficPolicy: Cluster
      # Environment-specific IPs — update to match your node addresses
      externalIPs:
        - 51.81.211.178   # k3s04 (OVH VPS)
        - 45.32.227.185   # k3s02 (Vultr VPS)
        - 5.78.149.27     # k3s03 (Hetzner VPS)

    ingressClass:
      enabled: true
      name: traefik
      isDefaultClass: false

    ports:
      web:
        redirectTo:
          port: websecure
      bedrock:
        port: 19132           # Traefik's internal listening port
        expose:
          default: true
        exposedPort: 19132    # LB/Node port that clients hit
        protocol: UDP
      dev3000:
        port: 3000
        exposedPort: 3000
        expose:
          default: true
      dev5173:
        port: 5173
        exposedPort: 5173
        expose:
          default: true
      dev8080:
        port: 8080
        exposedPort: 8080
        expose:
          default: true
