apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "30.x"
  values:
    # Run on every node and bind directly to host :80/:443
    deployment:
      kind: DaemonSet
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

    # Listen on 80/443 (no in-pod 8000/8443)
    ports:
      web:
        port: 80
        expose: true
        exposedPort: 80
      websecure:
        port: 443
        expose: true
        exposedPort: 443

    # Allow binding to low ports even if the image is non-root by default
    securityContext:
      capabilities:
        add:
          - NET_BIND_SERVICE
      runAsUser: 0

    # Make it the default ingress class
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    # No Service object needed (we’re using hostNetwork)
    service:
      enabled: false

    # Don’t rely on a published Service to set ingress status
    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: false

    # Schedule even on control-plane/tainted nodes if needed
    tolerations:
      - operator: "Exists"

    # (Optional but handy)
    logs:
      general:
        level: INFO
      access:
        enabled: true

    # Be explicit about entrypoint addresses (belt-and-suspenders)
    additionalArguments:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
