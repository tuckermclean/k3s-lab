apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: "36.3.0"
  values:
    rbac:
      enabled: true
    ingressClass:
      enabled: true
      isDefaultClass: true
    service:
      type: LoadBalancer
    dashboard:
      enabled: true
      domain: ""
