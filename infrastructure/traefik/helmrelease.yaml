apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "30.x"
  values:
    deployment:
      kind: DaemonSet

    service:
      enabled: true
      type: LoadBalancer
      spec:
        externalTrafficPolicy: Cluster

    ingressClass:
      enabled: true
      name: traefik
      isDefaultClass: false