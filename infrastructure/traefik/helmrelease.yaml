apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "30.x"
  values:
    hostNetwork: false
    dnsPolicy: ClusterFirst

    deployment:
      kind: DaemonSet
      # If you added rollingUpdate knobs for hostNetwork, you can drop them now

    ports:
      web:
        port: 8000        # container port (unprivileged)
        hostPort: 80      # host port to expose
        expose: true
        exposedPort: 80
      websecure:
        port: 8443
        hostPort: 443
        expose: true
        exposedPort: 443

    service:
      enabled: false      # we’re not using a Service LB

    # You can also drop the capability now; it’s not needed
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile: { type: RuntimeDefault }
      capabilities:
        drop: ["ALL"]
