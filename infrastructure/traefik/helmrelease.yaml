apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "30.x"
  values:
    hostNetwork: false
    dnsPolicy: ClusterFirst

    deployment:
      kind: DaemonSet

    # EntryPoints/ports inside the pod (same as the chart defaults)
    ports:
      traefik:
        port: 9000
        expose: true
        exposedPort: 9000
      web:
        port: 8000
        expose: true
        exposedPort: 80
      websecure:
        port: 8443
        expose: true
        exposedPort: 443

    # Single Service named "traefik" exposing all the above ports
    service:
      enabled: true
      single: true
      spec:
        externalTrafficPolicy: Local

    # Dashboard/API already enabled by the chart defaults; keep explicit for clarity
    additionalArguments:
      - "--api.dashboard=true"
      - "--metrics.prometheus=true"
      - "--entryPoints.websecure.http.tls=true"

    # Make sure the chart owns the IngressClass named "traefik" (matches your Ingresses)
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik
