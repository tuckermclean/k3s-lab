apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "30.x"
  values:
    deployment:
      kind: DaemonSet

    service:
      enabled: true
      type: LoadBalancer
      spec:
        externalTrafficPolicy: Cluster
      # Environment-specific IPs — update to match your node addresses
      externalIPs:
        - 51.81.211.178   # k3s04 (OVH VPS)
        - 45.32.227.185   # k3s02 (Vultr VPS)
        - 5.78.149.27     # k3s03 (Hetzner VPS)

    ingressClass:
      enabled: true
      name: traefik
      isDefaultClass: false

    ports:
      web:
        redirectTo:
          port: websecure
      bedrock:
        port: 19132           # Traefik's internal listening port
        expose:
          default: true
        exposedPort: 19132    # LB/Node port that clients hit
        protocol: UDP
