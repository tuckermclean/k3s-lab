apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      # Pin to v29 to avoid the v30 service templating change
      version: "29.x"
  values:
    # Keep DaemonSet if you want one pod per node
    deployment:
      kind: DaemonSet

    # Standard container ports (chart defaults)
    ports:
      traefik:
        port: 9000
        expose: true
        exposedPort: 9000
      web:
        port: 8000
        expose: true
        exposedPort: 80
      websecure:
        port: 8443
        expose: true
        exposedPort: 443

    # Create a single Service named "traefik" exposing all ports (k3s will use Klipper LB)
    service:
      enabled: true
      type: LoadBalancer
      # optional but good with multiple nodes:
      spec:
        externalTrafficPolicy: Local

    # Ensure the IngressClass matches your Ingresses
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik
