apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: "30.x"
  values:
    deployment:
      kind: DaemonSet

    ports:
      web:
        port: 8000
        expose: true
        exposedPort: 80
      websecure:
        port: 8443
        expose: true
        exposedPort: 443
      traefik:
        port: 9000
        expose: true
        exposedPort: 9000

    service:
      enabled: true
      type: LoadBalancer
      spec:
        externalTrafficPolicy: Local

    ingressClass:
      enabled: true
      name: traefik
      isDefaultClass: false
