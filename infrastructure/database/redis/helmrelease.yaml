apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-ha
  namespace: redis
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: redis-ha
      version: "4.39.0"
      sourceRef:
        kind: HelmRepository
        name: dandydeveloper
        namespace: flux-system

  values:
    # Use official Docker Hub redis image, pinned to a current durable tag.
    # 8.x line (chart appVersion is 8.8); 7.4 would be a major behind.
    # Verified: docker buildx imagetools inspect docker.io/library/redis:8.4.4-alpine
    image:
      repository: docker.io/library/redis
      tag: "8.4.4-alpine"

    replicas: 3

    # CRITICAL: noeviction prevents silent data loss under memory pressure.
    # This cluster holds JuiceFS filesystem metadata (see PR5). Under any
    # eviction policy, memory pressure can silently evict JuiceFS keys, causing
    # filesystem corruption. With noeviction, Redis rejects writes when full
    # (recoverable) rather than evicting live data.
    redis:
      config:
        maxmemory-policy: "noeviction"
        min-replicas-to-write: 1
        min-replicas-max-lag: 5
        save: "900 1"
        repl-diskless-sync: "yes"
        rdbcompression: "yes"
        rdbchecksum: "yes"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    sentinel:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    # Auth: reuse existing SOPS-managed secret in the redis namespace.
    # Our secret key is "redis-password"; the chart default authKey is "auth",
    # so we override authKey here to match.
    auth: true
    existingSecret: redis-auth
    authKey: redis-password

    # Persistence: local-path storageClass, 2Gi per redis replica.
    persistentVolume:
      enabled: true
      storageClass: local-path
      size: 2Gi

    # Hard pod anti-affinity: one redis pod per node.
    # hardAntiAffinity: true is the chart default (requiredDuringScheduling),
    # set explicitly here for clarity.
    hardAntiAffinity: true

    # HAProxy: enabled, proxies to the current Sentinel-elected master.
    # Stable master endpoint: redis-ha-haproxy.redis.svc.cluster.local:6379
    # Use official Docker Hub haproxy image, pinned.
    # Verified: docker buildx imagetools inspect docker.io/library/haproxy:3.3.10-alpine
    haproxy:
      enabled: true
      replicas: 3
      hardAntiAffinity: true
      image:
        repository: docker.io/library/haproxy
        tag: "3.3.10-alpine"
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
      service:
        type: ClusterIP
