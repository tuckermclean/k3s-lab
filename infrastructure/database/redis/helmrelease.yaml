apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shared-redis
  namespace: redis
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: redis
      version: "25.3.5"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    global:
      security:
        allowInsecureImages: true

    image:
      registry: docker.io
      repository: bitnamilegacy/redis
      tag: "8.2.1-debian-12-r0"

    architecture: replication

    # CRITICAL: noeviction prevents silent data loss under memory pressure.
    # This cluster will also hold JuiceFS filesystem metadata (PR5). Under any
    # eviction policy, memory pressure can silently evict JuiceFS keys, causing
    # filesystem corruption. With noeviction, Redis rejects writes when full
    # (recoverable) rather than evicting live data.
    commonConfiguration: |-
      maxmemory-policy noeviction

    auth:
      enabled: true
      existingSecret: redis-auth
      existingSecretPasswordKey: redis-password

    sentinel:
      enabled: true
      masterSet: mymaster
      quorum: 2
      image:
        registry: docker.io
        repository: bitnamilegacy/redis-sentinel
        tag: "8.2.1-debian-12-r0"

    replica:
      replicaCount: 3
      persistence:
        enabled: true
        storageClass: local-path
        size: 2Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: redis
                  app.kubernetes.io/instance: shared-redis
              topologyKey: kubernetes.io/hostname

    master:
      persistence:
        enabled: true
        storageClass: local-path
        size: 2Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: redis
                  app.kubernetes.io/instance: shared-redis
              topologyKey: kubernetes.io/hostname
