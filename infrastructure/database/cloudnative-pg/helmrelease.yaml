# Chart version: 0.23.2  →  operator appVersion: 1.25.1
# Pinned to chart 0.23.2 (operator 1.25.x) because CNPG 1.26 deprecated the
# in-tree .spec.backup.barmanObjectStore S3 syntax that later DB-migration PRs
# rely on. The declarative Database CRD is present in 1.25. Do not bump past
# chart 0.23.x without reviewing the barmanObjectStore deprecation path first.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
