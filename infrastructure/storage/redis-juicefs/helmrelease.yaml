apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-redis
  namespace: kube-system
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: redis
      version: "25.3.5"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    architecture: standalone

    auth:
      enabled: true
      existingSecret: juicefs-redis-auth
      existingSecretPasswordKey: redis-password

    master:
      persistence:
        enabled: true
        storageClass: longhorn
        size: 2Gi
