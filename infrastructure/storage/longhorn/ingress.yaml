apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-frontend
  namespace: longhorn-system
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`longhorn.dcxxiv.com`)
      services:
        - name: longhorn-frontend
          port: 80
  tls:
    secretName: longhorn-tls
