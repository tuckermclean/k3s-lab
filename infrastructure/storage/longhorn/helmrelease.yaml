apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: longhorn
      version: 1.12.0    # or whatever you pick
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 2        # cluster-wide “normal” volumes
      allowRecurringJobWhileVolumeDetached: true
      # Backup target — configure before storing any data you care about.
      # Longhorn backups are the only recovery path when ALL replicas are
      # corrupted (block-level replication propagates filesystem corruption).
      # Example (AWS S3):
      #   backupTarget: s3://your-bucket@us-east-1/longhorn-backups
      #   backupTargetCredentialSecret: longhorn-backup-secret
      # The secret needs AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY keys
      # in namespace longhorn-system.
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
    longhornManager:
      tolerations:
        - key: node-role
          operator: Equal
          value: storage-ingress
          effect: NoSchedule
