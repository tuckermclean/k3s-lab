apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.10.1    # or whatever you pick
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 2        # cluster-wide “normal” volumes
      allowRecurringJobWhileVolumeDetached: true
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
    longhornManager:
      tolerations:
        - key: node-role
          operator: Equal
          value: storage-ingress
          effect: NoSchedule
