apiVersion: v1
kind: Secret
metadata:
  name: longhorn-backup-secret
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/component: backup-secret
type: Opaque
stringData:
  # Run 'make store-longhorn-backup-secret' to fill in and encrypt.
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-west-2"
  # Full backupTarget URL — Flux reads this directly into the Longhorn HelmRelease
  # via valuesFrom, so the bucket name never appears in any plain YAML file.
  # Format: s3://<bucket>@<region>/longhorn  (region must match AWS_DEFAULT_REGION above)
  # Do NOT add AWS_ENDPOINTS — only for S3-compatible stores (MinIO etc.), not real AWS.
  BACKUP_TARGET: "s3://<bucket>@us-west-2/longhorn"
