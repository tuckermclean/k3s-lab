apiVersion: v1
kind: Secret
metadata:
  name: longhorn-backup-secret
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/component: backup-secret
type: Opaque
stringData:
  # Least-privilege IAM user created by bootstrap/terraform/aws-backup.
  # These are NOT the provisioning credentials from secrets.sops.yaml —
  # they are the Terraform outputs from 'make output-aws-backup'.
  # Run 'make store-longhorn-backup-secret' to fill in and encrypt.
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  # Must match the @region in the backupTarget URL in clusters/ovh-lab/longhorn-kustomization.yaml
  AWS_DEFAULT_REGION: "us-west-2"
  # Do NOT add AWS_ENDPOINTS — that is only for S3-compatible stores (MinIO etc.).
  # For real AWS, omitting it lets the SDK resolve the regional endpoint automatically.
