apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-csi-driver
  namespace: kube-system
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: juicefs-csi-driver
      version: 0.32.0
      sourceRef:
        kind: HelmRepository
        name: juicefs
        namespace: flux-system
  values:
    # Keep namespaces consistent: install in kube-system
    namespaceOverride: kube-system

    controller: {}

    # Use default CSIDriver name csi.juicefs.com
    driver:
      name: csi.juicefs.com

    dashboard:
      enabled: true
      # No built-in auth — Authentik forwardAuth fronts the IngressRoute.
