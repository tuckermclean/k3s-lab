apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-csi-driver
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: juicefs-csi-driver
      version: 0.30.3
      sourceRef:
        kind: HelmRepository
        name: juicefs
        namespace: flux-system
  values:
    # Keep namespaces consistent: install in kube-system
    namespaceOverride: kube-system

    # Minimal resources for homelab
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      # Mount Longhorn-backed PVC at /var/lib/juicefs for SQLite meta
      extraVolumes:
        - name: juicefs-meta
          persistentVolumeClaim:
            claimName: juicefs-meta-pvc
      extraVolumeMounts:
        - name: juicefs-meta
          mountPath: /var/lib/juicefs
          readOnly: false

    node:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    # Use default CSIDriver name csi.juicefs.com
    driver:
      name: csi.juicefs.com

    # Basic securityContext that works with K3s + Longhorn
    podSecurityContext:
      fsGroup: 65534
      runAsUser: 0
      runAsGroup: 0
