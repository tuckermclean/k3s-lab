# Daily DR backup of the JuiceFS metadata (now on shared redis-ha DB 2).
# `juicefs dump` exports portable JSON (engine/version-agnostic; strips the S3
# secret key) → gzip → S3. Needed because redis-ha is 3-node HA but local-path
# (not Longhorn-backed), so this is the only OFFSITE copy of the filesystem map.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: juicefs-meta-backup
  namespace: kube-system
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          volumes:
            - name: dump
              emptyDir: {}
          initContainers:
            - name: juicefs-dump
              image: juicedata/juicefs-csi-driver:v0.32.0@sha256:856e1c20175331428515b957fbfe3a3aba2ccce3d375d0eddc099cf416d95899
              command: ["sh", "-c", "juicefs dump \"$METAURL\" /dump/meta.json && wc -c /dump/meta.json"]
              env:
                - name: METAURL
                  valueFrom:
                    secretKeyRef: {name: juicefs-secret, key: metaurl}
              volumeMounts:
                - {name: dump, mountPath: /dump}
          containers:
            - name: upload
              image: amazon/aws-cli:2.36.4@sha256:7cbd2e4d2c469c5c448dc249c7c8109ada7fa6ae57a1dc3f348fa39d19b6c689
              command:
                - sh
                - -c
                - 'aws s3 cp /dump/meta.json "s3://k3s-lab-backups/juicefs/meta-$(date +%F-%H%M).json" && echo uploaded'
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom: {secretKeyRef: {name: juicefs-meta-backup-creds, key: AWS_ACCESS_KEY_ID}}
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom: {secretKeyRef: {name: juicefs-meta-backup-creds, key: AWS_SECRET_ACCESS_KEY}}
                - name: AWS_DEFAULT_REGION
                  valueFrom: {secretKeyRef: {name: juicefs-meta-backup-creds, key: AWS_DEFAULT_REGION}}
              volumeMounts:
                - {name: dump, mountPath: /dump}
