apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-s3-gateway
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: juicefs-s3-gateway
      version: ">=0.0.1"
      sourceRef:
        kind: HelmRepository
        name: juicefs
        namespace: flux-system
  # Pull credentials from the existing juicefs-secret rather than duplicating
  # them in a new SOPS-encrypted secret. The secret keys are renamed here to
  # match what the s3-gateway chart expects (accessKey vs access-key, etc.).
  valuesFrom:
    - kind: Secret
      name: juicefs-secret
      valuesKey: name
      targetPath: secret.name
    - kind: Secret
      name: juicefs-secret
      valuesKey: metaurl
      targetPath: secret.metaurl
    - kind: Secret
      name: juicefs-secret
      valuesKey: storage
      targetPath: secret.storage
    - kind: Secret
      name: juicefs-secret
      valuesKey: bucket
      targetPath: secret.bucket
    - kind: Secret
      name: juicefs-secret
      valuesKey: region
      targetPath: secret.region
    - kind: Secret
      name: juicefs-secret
      valuesKey: access-key
      targetPath: secret.accessKey
    - kind: Secret
      name: juicefs-secret
      valuesKey: secret-key
      targetPath: secret.secretKey
  values:
    # --no-update: exit 0 if the filesystem is already registered in Redis;
    # fail if not (prevents silently regenerating a new UUID on restart).
    # The one-time bootstrap format was done via a kubectl Job.
    formatOptions: "--no-update"
    # MinIO browser (web file manager) is enabled by default in the JuiceFS
    # gateway build. Log in with the S3 access-key / secret-key.
    service:
      type: ClusterIP
