apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      version: "56.x"
  valuesFrom:
    - kind: Secret
      name: grafana-admin-secret
      valuesKey: adminPassword
      targetPath: grafana.adminPassword
  values:
    grafana:
      envFromSecret: grafana-oidc-secret
      grafana.ini:
        server:
          root_url: https://grafana.home.dcxxiv.com
        auth:
          signout_redirect_url: https://auth.home.dcxxiv.com/application/o/grafana/end-session/
          disable_login_form: true
          oauth_auto_login: true
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          scopes: openid email profile
          auth_url: https://auth.home.dcxxiv.com/application/o/authorize/
          token_url: https://auth.home.dcxxiv.com/application/o/token/
          api_url: https://auth.home.dcxxiv.com/application/o/userinfo/
          use_pkce: true
          client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          role_attribute_path: contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: local-selfsigned
        hosts:
          - grafana.home.dcxxiv.com
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.home.dcxxiv.com
    prometheus:
      prometheusSpec:
        retention: 7d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: longhorn
              resources:
                requests:
                  storage: 10Gi
