apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      version: "87.x"
  valuesFrom:
    - kind: Secret
      name: grafana-admin-secret
      valuesKey: adminPassword
      targetPath: grafana.adminPassword
  values:
    grafana:
      envFromSecret: grafana-oidc-secret
      grafana.ini:
        server:
          root_url: https://grafana.dcxxiv.com
        auth:
          signout_redirect_url: https://auth.dcxxiv.com/application/o/grafana/end-session/
          disable_login_form: true
          oauth_auto_login: true
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          scopes: openid email profile
          auth_url: https://auth.dcxxiv.com/application/o/authorize/
          token_url: https://auth.dcxxiv.com/application/o/token/
          api_url: https://auth.dcxxiv.com/application/o/userinfo/
          use_pkce: true
          client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          role_attribute_path: contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.dcxxiv.com
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.dcxxiv.com
    alertmanager:
      alertmanagerSpec:
        replicas: 3
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: local-path
              resources:
                requests:
                  storage: 1Gi
    prometheus:
      prometheusSpec:
        replicas: 2
        retention: 7d
        # Chart default is "soft", which injects its own podAntiAffinity block
        # into affinity in addition to the custom hard requirement below,
        # producing a duplicate podAntiAffinity key and breaking rendering.
        # We supply our own (stronger, hard-required) rule via `affinity`
        # below, so disable the chart's built-in preset.
        podAntiAffinity: ""
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - prometheus
                topologyKey: kubernetes.io/hostname
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: local-path
              resources:
                requests:
                  storage: 10Gi
