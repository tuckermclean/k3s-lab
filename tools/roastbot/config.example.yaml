# RoastBot configuration example
# Copy to config.yaml and adjust

GITHUB_TOKEN: "ghp_xxx..."  # or set env var GITHUB_TOKEN
repos:
  - "owner/repo1"
  - "owner/repo2"

# Optional
poll_interval: 120
review_commits: false
branch_filters:
  - main
  - master
log_level: INFO
state_file: ".roastbot_state.json"

# LLM settings
llm_provider: openai  # mock | openai
OPENAI_API_KEY: "sk-xxx"  # or set env var OPENAI_API_KEY
openai_model: gpt-4o-mini
# openai_base_url: "https://api.openai.com/v1" # optional for self-hosted gateways
