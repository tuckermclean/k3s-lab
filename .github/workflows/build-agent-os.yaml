name: build-agent-os

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-os/build/**'
      - '.github/workflows/build-agent-os.yaml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/agent-os/build
          push: true
          tags: |
            ghcr.io/tuckermclean/agent-os:0.2.1
            ghcr.io/tuckermclean/agent-os:latest
