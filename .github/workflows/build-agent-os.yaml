name: build-agent-os

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent-os/build/**'
      - '.github/workflows/build-agent-os.yaml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/agent-os/build
          push: true
          tags: |
            ghcr.io/tuckermclean/agent-os:0.2.2
            ghcr.io/tuckermclean/agent-os:latest
