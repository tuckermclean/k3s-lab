name: Validate Manifests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Forbid :latest image tags
        run: |
          # Mutable :latest tags make deploys non-reproducible. Pin to a
          # version tag and/or @sha256 digest instead (Renovate keeps them
          # current). Matches `image: repo:latest` but not `repo@sha256:...`.
          if grep -rnE 'image:[[:space:]]*[^@[:space:]]*:latest([[:space:]"'\'']|$)' apps/ infrastructure/; then
            echo "::error::Found :latest image tag(s) above — pin to a version and/or digest."
            exit 1
          fi
          echo "No :latest image tags found."

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2
        with:
          kustomize-version: '5.3.0'

      - name: Install kubeconform
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Validate kustomizations (build + schema)
        run: |
          kustomize build clusters/ovh-lab \
            | kubeconform -strict -ignore-missing-schemas -summary \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Lint YAML
        run: |
          yamllint -s .