apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./infrastructure/headlamp"
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: cert-manager-config
    - name: authentik
