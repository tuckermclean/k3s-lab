apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: deluge
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/deluge
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    # letsencrypt-prod ClusterIssuer (DNS01/Cloudflare) for the TLS cert
    - name: cert-manager-config
    # longhorn StorageClass for the config PVC
    - name: longhorn
    # juicefs StorageClass for the shared media PVC
    - name: storage-juicefs
    # authentik/authentik forwardAuth Middleware referenced by the IngressRoute
    - name: authentik
