apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dcxxiv-home
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/dcxxiv-home
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: cert-manager-config
