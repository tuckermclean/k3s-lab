apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-redis-juicefs
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/storage/redis-juicefs
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  timeout: 5m
  dependsOn:
    - name: longhorn
