apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nodecast-tv
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/nodecast-tv
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    # letsencrypt-prod (DNS01) ClusterIssuer for the TLS certificate
    - name: cert-manager-config
    # longhorn StorageClass for the data PVC
    - name: longhorn
