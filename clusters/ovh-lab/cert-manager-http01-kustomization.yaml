apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-http01
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./infrastructure/cert-manager-http01"
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: cert-manager
