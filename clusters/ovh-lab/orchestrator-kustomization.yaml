apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: orchestrator
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/orchestrator
  prune: true
  # ─────────────────────────────────────────────────────────────────────────
  # SINGLE SOURCE OF TRUTH for the orchestrator version. Bump ONLY this line.
  # ${ORCH_VERSION} is substituted into the GitRepository tag (v${ORCH_VERSION}),
  # the control-plane image tag, and HARNESS_K8S_IMAGE in apps/orchestrator/.
  # ─────────────────────────────────────────────────────────────────────────
  postBuild:
    substitute:
      ORCH_VERSION: "0.1.24"
      GITHUB_BOT_LOGIN: "orecchiette1111"
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    # letsencrypt-prod ClusterIssuer (DNS01/Cloudflare) for the TLS cert
    - name: cert-manager-config
    # longhorn StorageClass for the SQLite PVC
    - name: longhorn
    # authentik/authentik forwardAuth Middleware referenced by the IngressRoute
    - name: authentik
