apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/storage/longhorn
  prune: true
  dependsOn:
    - name: cert-manager-config
  patches:
    # Authentik proxy outpost doesn't exist yet — remove the forwardAuth middleware
    # so the UI is reachable. Re-add once the 'infrastructure' outpost is deployed.
    - target:
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        name: longhorn-frontend
      patch: |
        - op: remove
          path: /spec/routes/0/middlewares
