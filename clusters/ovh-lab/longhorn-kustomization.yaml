apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/storage/longhorn
  prune: true
  wait: true
  timeout: 15m
  dependsOn:
    - name: cert-manager-config
  # OVH-only: activate the S3 backup target. The shared base HelmRelease leaves
  # backupTarget commented out so the home cluster is unaffected. Longhorn seeds
  # the auto-created 'default' BackupTarget from these defaultSettings values.
  # backupTarget is read from the SOPS-encrypted secret (BACKUP_TARGET key) via
  # valuesFrom — the bucket name never appears in any plain YAML file.
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: longhorn
          namespace: longhorn-system
        spec:
          valuesFrom:
            - kind: Secret
              name: longhorn-backup-secret
              valuesKey: BACKUP_TARGET
              targetPath: defaultSettings.backupTarget
          values:
            defaultSettings:
              backupTargetCredentialSecret: "longhorn-backup-secret"
      target:
        kind: HelmRelease
        name: longhorn
        namespace: longhorn-system
