apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/storage/longhorn
  prune: true
  dependsOn:
    - name: cert-manager-config
  # OVH-only: activate the S3 backup target. The shared base HelmRelease leaves
  # backupTarget commented out so the home cluster is unaffected. Longhorn seeds
  # the auto-created 'default' BackupTarget from these defaultSettings values.
  # The credential secret is applied by the longhorn-backup Kustomization.
  # Update bucket name to match the output of 'make output-aws-backup'.
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: longhorn
          namespace: longhorn-system
        spec:
          values:
            defaultSettings:
              backupTarget: "s3://k3s-lab-longhorn-backups@us-west-2/longhorn"
              backupTargetCredentialSecret: "longhorn-backup-secret"
      target:
        kind: HelmRelease
        name: longhorn
        namespace: longhorn-system
