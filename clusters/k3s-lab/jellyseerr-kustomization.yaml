apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyseerr
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./apps/jellyseerr"
  prune: true
  dependsOn:
    - name: traefik
    - name: cert-manager-config
    - name: jellyfin
