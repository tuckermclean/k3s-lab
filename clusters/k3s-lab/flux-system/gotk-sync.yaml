apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: rebuild/1754003415-minimal-gitops
  secretRef:
    name: flux-system
  url: https://github.com/tuckermclean/k3s-lab
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/k3s-lab
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
