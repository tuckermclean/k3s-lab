apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m
  path: ../../infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  dependsOn: []
  patches:
    - target:
        kind: Kustomization
      patch: |-
        - op: add
          path: /spec/dependsOn
          value: [] 