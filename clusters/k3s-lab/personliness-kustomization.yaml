apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: personliness
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/personliness
  prune: true
  dependsOn:
    - name: traefik
    - name: cert-manager-config
    - name: longhorn
