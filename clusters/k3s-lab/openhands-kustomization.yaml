apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openhands
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: "./apps/openhands"
  prune: true
  dependsOn:
    - name: traefik
    - name: cert-manager-config
